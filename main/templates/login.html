<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AnonymousPacil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["'Space Grotesk'", "ui-sans-serif", "system-ui"],
                        serif: ["'Cormorant Garamond'", "ui-serif", "Georgia"],
                        mono: ["'IBM Plex Mono'", "ui-monospace", "SFMono-Regular", "monospace"],
                    },
                    boxShadow: { glow: "0 30px 90px -40px rgba(15, 23, 42, 0.45)" },
                    keyframes: {
                        rise: { "0%": { opacity: "0", transform: "translateY(24px)" }, "100%": { opacity: "1", transform: "translateY(0)" } },
                        drift: { "0%, 100%": { transform: "translate3d(0, 0, 0)" }, "50%": { transform: "translate3d(0, -16px, 0)" } },
                    },
                    animation: {
                        rise: "rise 0.7s ease-out forwards",
                        drift: "drift 14s ease-in-out infinite",
                    },
                },
            },
        };
    </script>
    <style>
        :root { color-scheme: light; }
        body {
            --theme-bg: {{ bg_color }};
            --theme-text: {{ warna }};
            --theme-panel: rgba(255, 255, 255, 0.72);
            --theme-panel-strong: rgba(255, 255, 255, 0.88);
            --theme-line: rgba(255, 255, 255, 0.48);
            background-color: var(--theme-bg);
            color: var(--theme-text);
            background-image:
                radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.45), transparent 28%),
                radial-gradient(circle at 88% 12%, rgba(15, 23, 42, 0.10), transparent 26%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.12), transparent 55%);
        }
        @supports (background: color-mix(in srgb, white 50%, black 50%)) {
            body {
                --theme-panel: color-mix(in srgb, var(--theme-bg) 84%, white 16%);
                --theme-panel-strong: color-mix(in srgb, var(--theme-bg) 72%, white 28%);
                --theme-line: color-mix(in srgb, var(--theme-text) 18%, white 82%);
                background-image:
                    radial-gradient(circle at 12% 18%, color-mix(in srgb, white 62%, var(--theme-bg) 38%), transparent 28%),
                    radial-gradient(circle at 88% 12%, color-mix(in srgb, var(--theme-text) 10%, var(--theme-bg) 90%), transparent 26%),
                    linear-gradient(135deg, color-mix(in srgb, white 10%, var(--theme-bg) 90%), color-mix(in srgb, black 8%, var(--theme-bg) 92%));
            }
            .theme-muted { color: color-mix(in srgb, var(--theme-text) 78%, white 22%); opacity: 1; }
        }
        .theme-panel { background-color: var(--theme-panel-strong); border-color: var(--theme-line); backdrop-filter: blur(16px); }
        .theme-muted { opacity: 0.78; }
        
        /* Input styling override for Django Form */
        input[type="text"], input[type="password"] {
            width: 100%;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            background-color: rgba(255, 255, 255, 0.4);
            padding: 0.75rem 1rem;
            outline: none;
            transition: all 0.2s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            background-color: rgba(255, 255, 255, 0.7);
            border-color: rgba(15, 23, 42, 0.2);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body class="{{ font }} min-h-screen antialiased flex flex-col">
    {% load socialaccount %}
    <div class="relative isolate overflow-hidden flex-1 flex flex-col justify-center items-center px-6 py-12">
        <div class="pointer-events-none absolute left-[10%] top-[20%] -z-10 h-64 w-64 rounded-full bg-white/30 blur-3xl animate-drift"></div>
        <div class="pointer-events-none absolute bottom-[10%] right-[10%] -z-10 h-72 w-72 rounded-full bg-slate-950/10 blur-3xl animate-drift" style="animation-delay: 1.5s;"></div>

        <div class="w-full max-w-md theme-panel rounded-[34px] border p-8 shadow-glow opacity-0 animate-rise">
            <div class="text-center mb-8">
                <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-slate-950 text-xl font-semibold text-white shadow-lg mb-4">AP</div>
                <h1 class="text-3xl font-semibold">Welcome back</h1>
                <p class="theme-muted mt-2 text-sm">Please enter your details to sign in.</p>
            </div>

            <form method="POST" class="space-y-5">
                {% csrf_token %}
                {% if form.errors %}
                <div class="rounded-xl bg-red-500/10 border border-red-500/20 p-4 text-sm text-red-600 mb-4">
                    Username atau password salah. Silakan coba lagi.
                </div>
                {% endif %}
                
                <div>
                    <label class="block text-sm font-semibold mb-2">Username</label>
                    {{ form.username }}
                </div>
                
                <div>
                    <label class="block text-sm font-semibold mb-2">Password</label>
                    {{ form.password }}
                </div>

                <button type="submit" class="w-full mt-2 rounded-2xl bg-slate-950 px-5 py-3.5 text-sm font-semibold text-white transition hover:-translate-y-0.5 hover:bg-slate-800 hover:shadow-lg">
                    Sign In
                </button>
            </form>

            <div class="mt-6 flex items-center gap-4">
                <div class="h-px flex-1 bg-white/50"></div>
                <span class="text-xs font-semibold uppercase tracking-widest theme-muted">Or</span>
                <div class="h-px flex-1 bg-white/50"></div>
            </div>

            <a href="{% provider_login_url 'google' %}" class="mt-6 flex w-full items-center justify-center gap-3 rounded-2xl border border-white/60 bg-white/50 px-5 py-3.5 text-sm font-semibold text-slate-900 transition hover:-translate-y-0.5 hover:bg-white hover:shadow-md">
                <svg class="h-5 w-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </a>

            <p class="mt-8 text-center text-sm theme-muted">
                Don't have an account? 
                <a href="{% url 'main:register' %}" class="font-semibold text-slate-900 underline decoration-slate-900/30 underline-offset-4 hover:decoration-slate-900">Sign up</a>
            </p>
            <p class="mt-4 text-center text-sm theme-muted">
                <a href="{% url 'main:show_anggota' %}" class="font-semibold text-slate-900 hover:underline">&larr; Back to Home</a>
            </p>
        </div>
    </div>
</body>
</html>
