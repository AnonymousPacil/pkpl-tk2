<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Anggota</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-10" style="background-color: {{ bg_color }}">

    <div class="flex justify-end gap-4 mb-6">

        {% if user.is_authenticated %}
        {% if is_member %}
        <a href="{% url 'main:site_settings' %}"
            class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 transition">
            ⚙ Settings
        </a>
        {% endif %}

        <span class="px-4 py-2 text-sm" style="color: {{ warna }}">
            Hi, {{ user.email }}
        </span>

        <a href="{% url 'main:logout' %}" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 transition">
            Logout
        </a>
        {% else %}
        <a href="{% url 'main:login' %}" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
            Login with Google
        </a>
        {% endif %}

    </div>

    <h1 class="text-3xl font-bold mb-8 text-center" style="color: {{ warna }}">
        Biodata Anggota Kelompok AnonymousPacil
    </h1>

    <!-- Biodata Anggota -->
    <div class="flex flex-wrap gap-6 justify-center {{ font }}">

        {% for a in anggota %}

        <!-- Card -->
        <div class="bg-white shadow-lg rounded-xl p-6 w-64 hover:shadow-2xl transition" style="color: {{ warna }}">

            <div class="text-center mb-4">

                <!-- Foto dummy -->
                <div class="w-20 h-20 bg-gray-300 rounded-full mx-auto mb-3"></div>

                <h2 class="text-xl font-bold">
                    {{ a.nama }}
                </h2>

            </div>

            <div class="space-y-2">

                <p>
                    <span class="font-semibold">NPM:</span>
                    {{ a.NPM }}
                </p>

                <p>
                    <span class="font-semibold">Jenis Kelamin:</span>
                    {{ a.jenis_kelamin }}
                </p>

            </div>

        </div>

        {% endfor %}

    </div>
</body>

</html>
